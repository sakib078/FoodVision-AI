services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        TF_FLAVOR: ${TF_FLAVOR:-cpu}
    image: ${BACKEND_IMAGE:-foodvision-backend:local}
    container_name: foodvision-backend
    environment:
      PORT: 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    image: ${FRONTEND_IMAGE:-foodvision-frontend:local}
    container_name: foodvision-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
